name: Update Prompt Dashboard

on:
  push:
    paths:
      - 'data/**'
      - 'scripts/**'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Generate interactive dashboard
        run: cd scripts && python generate_interactive.py
      - name: Commit updated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/ data/processed/
          git diff --cached --quiet || git commit -m "chore: regenerate dashboard"
          git push

  deploy-pages:
    needs: regenerate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - run: git pull origin main
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/interactive/
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
